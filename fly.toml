app = "qengine"
primary_region = "lhr"

[build]
  dockerfile = "Dockerfile.prod"

[env]
  APP_HOST = "0.0.0.0"
  APP_PORT = "9000"
  IS_DEV_ENV = "FALSE"

[http_service]
  internal_port = 9000
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80

  [[http_service.checks]]
    interval = "30s"
    timeout = "5s"
    grace_period = "15s"
    method = "GET"
    path = "/"

[mounts]
  source = "qengine_data"
  destination = "/qengine/storage"
